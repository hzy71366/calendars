name: 更新 ICS 日历

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:
  push:
    paths:
      - "config.yaml"
      - "src/**"
      - "scripts/**"
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: 运行测试
        run: python -m pytest

      - name: 生成 ICS 文件
        run: python scripts/generate_ics.py

      - name: 提交并推送更新
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/
          git diff --quiet --cached || git commit -m "chore: auto-update ICS [skip ci]"
          git push
