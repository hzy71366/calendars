name: 发布 ICS 日历

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:
  push:
    paths:
      - "config.yaml"
      - "src/**"
      - "scripts/**"
    branches: [main]

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: 运行测试
        run: python -m pytest

      - name: 生成 ICS 文件
        run: python scripts/generate_ics.py

      - name: 部署到 GitHub Pages
        run: |
          cd docs
          git init
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "deploy: $(date +%Y-%m-%d)"
          git push --force --quiet "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:gh-pages
