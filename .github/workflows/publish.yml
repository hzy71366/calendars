name: 发布 ICS 日历

on:
  schedule:
    - cron: "0 0 * * 1"        # 每周一 00:00 UTC
  workflow_dispatch:            # 手动触发
  push:
    paths:
      - "config.yaml"
      - "src/**"
      - "scripts/**"
      - "requirements.txt"
      - "pyproject.toml"
    branches: [main]

# Pages 部署权限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只运行一个部署
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: 运行测试
        run: python -m pytest

      - name: 生成 ICS 文件
        run: python scripts/generate_ics.py

      - name: 上传 Pages 制品
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

  deploy:
    needs: test-and-build
    if: success()
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
