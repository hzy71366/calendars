name: 发布 ICS 日历

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:
  push:
    paths:
      - "config.yaml"
      - "src/**"
      - "scripts/**"
      - "requirements.txt"
      - "pyproject.toml"
    branches: [main]

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: 运行测试
        run: python -m pytest

      - name: 生成 ICS 文件
        run: python scripts/generate_ics.py

      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          keep_files: false
