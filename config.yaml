# ============================================================
# Calendar Engine — 用户配置
# ============================================================

config_version: 1

# --- 日历元信息 ---
calendar_name: "六斋日"
timezone: "Asia/Shanghai"
language: "zh-CN"

# --- 事件模板 ---
event_title: "{emoji} {name} · {lunar}"
event_description: "{lunar}\n六斋日，过午不食，持斋修行，诸恶莫作，众善奉行。"

# --- 全局提醒（日历未指定自己的提醒时使用）---
alarm:
  enabled: true
  days_before: 1
  time: "18:00"

# --- 分类标签 ---
categories:
  - "佛教"
  - "斋日"

# --- 日历类型配置 ---
# 每个日历可独立设置提醒
calendars:
  liuzhai:
    enabled: false
    emoji: "📿"
    alarm:
      enabled: true
      days_before: 0
      time: "06:00"
  shizhai:
    enabled: false
    emoji: "🪷"
    alarm:
      enabled: true
      days_before: 0
      time: "06:00"

# --- 年份范围 ---
years:
  ahead: 10
