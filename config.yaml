# ============================================================
# Calendar Engine — 用户配置
# ============================================================

config_version: 1

# --- 全局设置 ---
timezone: "Asia/Shanghai"
language: "zh-CN"

# --- 事件模板 ---
event_title: "{emoji} {name} · {lunar}"
event_description: "{lunar}\n六斋日，过午不食，持斋修行，诸恶莫作，众善奉行。"

# --- 分类标签 ---
categories:
  - "佛教"
  - "斋日"

# --- 日历类型配置 ---
# 每个日历可独立设置提醒
calendars:
  liuzhai:
    name: "六斋日"
    enabled: true
    emoji: "📿"
    alarm:
      enabled: true
      days_before: 0
      time: "06:00"
  shizhai:
    name: "十斋日"
    enabled: true
    emoji: "🪷"
    alarm:
      enabled: true
      days_before: 0
      time: "06:00"

# --- 年份范围 ---
years:
  ahead: 10
