# ============================================================
# Calendar Engine — 用户配置
# 修改此文件后，运行以下命令重新生成：
#   python scripts/generate_ics.py
# 或等待 GitHub Actions 自动更新。
# ============================================================

config_version: 1

# --- 日历元信息 ---
calendar_name: "六斋日"
timezone: "Asia/Shanghai"

# --- 语言 ---
# zh-CN / en / bilingual
language: "zh-CN"

# --- 事件标题模板 ---
# 可用变量: {emoji} {name} {lunar} {solar}
event_title: "{emoji} {name} · {lunar}"

# --- 事件描述模板 ---
# 可用变量: {lunar} {solar}
event_description: "{lunar}\n六斋日，过午不食，持斋修行，诸恶莫作，众善奉行。"

# --- 提醒设置 ---
alarm:
  enabled: true
  days_before: 1
  time: "09:00"

# --- 图标 ---
emoji: "🔴"

# --- 分类标签 ---
categories:
  - "佛教"
  - "斋日"

# --- 斋日类型 ---
zhai_types:
  liuzhai: true

# --- 日历类型开关 ---
calendars:
  liuzhai: true
  shizhai: true

# --- 年份范围 ---
years:
  ahead: 10
